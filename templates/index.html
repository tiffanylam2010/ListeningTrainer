<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Subtitle Editor</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

.container {
    display: flex;
    height: 100vh;
}

/* LEFT */
.left {
    flex: 3;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* RIGHT */
.right {
    flex: 1;
    border-left: 1px solid #ddd;
    padding: 10px;
    overflow-y: auto;
}

/* VIDEO */
#player {
    width: 100%;
    height: 720px;
}

/* current subtitle */
.current-subtitle {
    margin-top: 12px;
    padding: 14px;
    background: #000;
    color: #fff;
    font-size: 24px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: calc(24px * 1.6 * 2 + 28px);
}

/* controls */
.controls {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.controls button {
    padding: 6px 10px;
}

/* bottom */
.bottom-bar {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
}

.bottom-bar input {
    padding: 6px;
    width: 220px;
}

/* subtitle list */
.subtitle-item {
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.subtitle-item:hover {
    background: #f0f0f0;
}

.active {
    background: #cfe8ff;
}

.sub-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.sub-time {
    font-size: 12px;
    color: #666;
}

.sub-text {
    margin-top: 4px;
    width: 100%;
    box-sizing: border-box;
}

.delete-btn {
    background: #ffdddd;
}

.ab-btn {
    margin-right: 6px;
    background: #ddeeff;
}

</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div id="player"></div>

        <div class="current-subtitle" id="currentText"></div>

        <!-- controls -->
        <div class="controls">

            <button onclick="shiftStart(-0.2)">Start -0.2</button>
            <button onclick="shiftStart(0.2)">Start +0.2</button>
            <button onclick="shiftEnd(-0.2)">End -0.2</button>
            <button onclick="shiftEnd(0.2)">End +0.2</button>

            <div style="width:20px;"></div>

            <label>
                <input id="autoPauseCheckbox" type="checkbox" checked />
                Auto Pause
            </label>

            <div style="width:20px;"></div>

            <button onclick="saveSubtitles(false)">Save</button>
        </div>

        <!-- bottom -->
        <div class="bottom-bar">
            <input id="videoIdInput" value="2n41YjR5QfU" />
            <button onclick="loadVideo()">Load</button>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <div id="subtitleList"></div>
    </div>

</div>

<script>

let player;
let subtitles = [];
let currentVideoId = "2n41YjR5QfU";
let lastSaveTime = Date.now();
let lastContent = "";

const state = {
    currentTime: 0,
    currentIndex: -1,
    loopIndexA:-1,
    loopIndexB:-1,
    setA: -1,
    setB: -1,
    autoPause: true,
    pauseTime: 0
};

const lastVideoId = localStorage.getItem("lastVideoId");
    
if (lastVideoId) {

    document.getElementById("videoIdInput").value = lastVideoId;
    <!-- currentVideoId = lastVideoId; -->
    loadVideo();
}

function getDownloadUrl() {
    return `http://localhost:8000/subtitle/read/${currentVideoId}`;
}

function getSaveUrl() {
    return `http://localhost:8000/subtitle/save/${currentVideoId}`;
}

/* =========================
   LOAD VIDEO
========================= */
function loadVideo() {

    const v = document.getElementById("videoIdInput").value.trim();
    if (!v) return;

    currentVideoId = v;

    if (player) {
        player.loadVideoById(currentVideoId);
    } else {
        onYouTubeIframeAPIReady();
    }

    loadSubtitles();
    localStorage.setItem(
        "lastVideoId",
        currentVideoId
    );
}

/* =========================
   PARSE
========================= */
function parseSubtitle(text) {

    const lines = text
        .split('\n')
        .map(l => l.trim())
        .filter(l => l !== '');

    const result = [];

    let current = null;

    for (const line of lines) {

        // 是否是时间行
        if (/^\d+:\d+(\.\d+)?$/.test(line)) {

            // 遇到新的时间，先提交上一条
            if (current) {
                result.push(current);
            }

            current = {
                time: parseTime(line),
                content: ""
            };

        } else {

            // 普通文本行
            if (current) {

                // 多行内容自动拼接
                if (current.content) {
                    current.content += "\n";
                }

                current.content += line;
            }
        }
    }

    // 最后一条
    if (current) {
        result.push(current);
    }

    return result;
}

function parseTime(t) {
    const [m, s] = t.split(':');
    return parseFloat(m) * 60 + parseFloat(s);
}

/* =========================
   RANGES
========================= */
function buildRanges() {

    for (let i = 0; i < subtitles.length; i++) {

        subtitles[i].end = subtitles[i + 1]
            ? subtitles[i + 1].time
            : subtitles[i].time + 9999;
    }
}

/* =========================
   LOAD SUBTITLES
========================= */
async function loadSubtitles() {

    const res = await fetch(getDownloadUrl());
    const text = await res.text();

    subtitles = parseSubtitle(text);

    buildRanges();

    renderList();
    
    lastContent = getSaveBody();
}

/* =========================
   RENDER LIST
========================= */
function renderList() {

    const el = document.getElementById("subtitleList");
    el.innerHTML = "";

    subtitles.forEach((s, i) => {

        const wrap = document.createElement("div");
        wrap.className = "subtitle-item";

        const header = document.createElement("div");
        header.className = "sub-header";

        const time = document.createElement("div");
        time.className = "sub-time";
        time.innerText = `${formatTime(s.time)} ~ ${formatTime(s.end)}`;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.innerText = "Delete";

        del.onclick = (e) => {
            e.stopPropagation();
            deleteSubtitle(i);
        };
        
        const ab = document.createElement("button");
        ab.className = "ab-btn";

        ab.onclick = (e) => {
            e.stopPropagation();
            setAB(i);
        };

        if( state.setA < 0 || i < state.setA){
            ab.innerText = "set-A";
        }else{ 
            if(state.setA==i){
                ab.innerText = "Y";
            }else{ 
                if(state.setB < 0){
                    ab.innerText = "set-B"
                }else{
                    if( i < state.setB){
                        ab.innerText = "Y"
                    }
                    if( i == state.setB){
                        ab.innerText = "Y"
                    }                
                    if( i > state.setB){
                        ab.innerText = "set-A"
                    }
                }
            }
        }
        
        header.appendChild(time);
        header.appendChild(ab);
        header.appendChild(del);


        const input = document.createElement("textarea");
        input.className = "sub-text";
        input.value = s.content;

        input.oninput = (e) => {
            subtitles[i].content = e.target.value;

            if (i === state.currentIndex) {
                document.getElementById("currentText").innerText =
                    e.target.value;
            }
        };

        wrap.appendChild(header);
        wrap.appendChild(input);

        <!-- wrap.onclick = () => setActive(i); -->
        <!-- wrap.ondblclick = () => seekTo(i); -->
        time.ondblclick = () => {
            seekTo(i, i, i);
            renderList();
        };

        el.appendChild(wrap);
    });
}
/* =========================
   AB
========================= */
function setAB(i) {
    if( i < 0 || i >= subtitles.length)
        return;
        
    if(state.setA < 0 || i <= state.setA || state.setB >= 0 ){
        // 没有设置A 或者 重新选一个比A小的 或者 已经有B了再点就是重新设置A
        state.setA = i;
        state.setB = -1;
        renderList();
    }else{ 
        if( state.setB <= 0 && state.setA >= 0 && i > state.setA){
            state.setB = i;
            <!-- state.loopIndexA = state.setA; -->
            <!-- state.loopIndexB = state.setB; -->
            <!-- alert("A:"+state.loopIndexA + " B:"+state.loopIndexB); -->
            renderList();
            seekTo(state.setA, state.setA, state.setB);
        }
    }
}

/* =========================
   DELETE
========================= */
function deleteSubtitle(i) {

    if (subtitles.length <= 1) return;

    if (i < subtitles.length - 1) {
        subtitles[i + 1].time = subtitles[i].time;
        const cur = (subtitles[i].content || "")
            .replace(/\s+/g, " ")
            .trim();

        const next = (subtitles[i + 1].content || "")
            .replace(/\s+/g, " ")
            .trim();

        if (cur) {
            subtitles[i + 1].content =
                next
                    ? `${cur} ${next}`
                    : cur;
        }
    }

    subtitles.splice(i, 1);
    if( state.loopIndexA <= i <= state.loopIndexB ){
        state.loopIndexB -= 1;
    }
    if(state.loopIndexB < state.loopIndexA){
        state.loopIndexB = state.loopIndexA;
    }

    buildRanges();
    renderList();

    if (state.currentIndex >= subtitles.length) {
        state.currentIndex = subtitles.length - 1;
    }

    setActive(state.currentIndex);
}

/* =========================
   FORMAT TIME
========================= */
function formatTime(t) {

    const m = Math.floor(t / 60);

    const s = (t % 60).toFixed(1).padStart(4, '0');

    return `${m}:${s}`;
}

/* =========================
   YOUTUBE
========================= */
function onYouTubeIframeAPIReady() {

    player = new YT.Player('player', {
        height: '720',
        width: '100%',
        videoId: currentVideoId
    });

    setInterval(tick, 80);

    loadSubtitles();
}

/* =========================
   SEEK
========================= */
function seekTo(i, a=-1, b=-1) {

    state.currentIndex = i;
    state.pauseTime = 0;
    if(a>=0 && b>=0){
        state.loopIndexA = a;
        state.loopIndexB = b;
    }
    player.seekTo(subtitles[i].time, true);
    player.playVideo();
    
    setActive(i);
}

/* =========================
   ACTIVE UI
========================= */
function setActive(i) {

    if (i < 0 || i >= subtitles.length) return;

    state.currentIndex = i;

    const items = document.querySelectorAll(".subtitle-item");

    items.forEach((el, idx) => {
        el.classList.toggle("active", idx === i);
    });

    document.getElementById("currentText").innerText =
        subtitles[i]?.content || "";

    scrollToActive(i);
}

/* =========================
   AUTO SCROLL (stable)
========================= */
function scrollToActive(i) {

    const container = document.getElementById("subtitleList");
    const items = container.querySelectorAll(".subtitle-item");

    const el = items[i];
    if (!el || !container) return;

    el.scrollIntoView({
        block: "nearest",
        behavior: "smooth"
    });
}

/* =========================
   CORE LOOP
========================= */
function tick() {

    if (!player) return;

    const t = player.getCurrentTime();

    state.currentTime = t;
    const idx = findIndexByTime(t);
    handleAutoPause(t, idx);
    
    if(!state.autoPause) {
        if (idx !== state.currentIndex) {
            setActive(idx);
        }
    }
    
    saveSubtitles(true);

}

/* =========================
   FIND INDEX
========================= */
function findIndexByTime(t) {

    for (let i = 0; i < subtitles.length; i++) {
        if (t >= subtitles[i].time && t < subtitles[i].end) {
            return i;
        }
    }
    return -1;
}

/* =========================
   AUTO PAUSE
========================= */
function handleAutoPause(t, idx) {

    const autoPause =
        document.getElementById("autoPauseCheckbox")?.checked;
    state.autoPause = autoPause

    if (!autoPause) return;

    if (idx === -1) return;

    const cur = subtitles[idx];
    
    if (player.getPlayerState() == YT.PlayerState.PLAYING) {
        if (idx > state.loopIndexB || (idx == state.loopIndexB && t >= cur.end - 0.05)){
            // 需要暂停
            player.pauseVideo();
            state.pauseTime = Date.now();
        }else{
            if( state.loopIndexA <= idx <= state.loopIndexB && idx != state.currentIndex){
                setActive(idx);
            }
        }
    }
    else{
        if( state.pauseTime > 0 && Date.now() - state.pauseTime >= 1000){
            // 暂停1s就继续循环播放
            seekTo(state.loopIndexA, state.loopIndexA, state.loopIndexB);
        }
    }


}

/* =========================
   SHIFT
========================= */
function shiftStart(delta) {

    if (state.currentIndex < 0) return;

    subtitles[state.currentIndex].time += delta;

    buildRanges();
    renderList();
    seekTo(state.currentIndex);
}

function shiftEnd(delta) {

    if (state.currentIndex < 0) return;
    if (state.currentIndex >= subtitles.length - 1) return;

    subtitles[state.currentIndex + 1].time += delta;

    buildRanges();
    renderList();
    seekTo(state.currentIndex);
}



/* =========================
   SAVE
========================= */

function getSaveBody(){
    return subtitles
        .map(s => `${formatTime(s.time)}\n${s.content}`)
        .join("\n");
}

async function saveSubtitles(auto) {
    if(auto && Date.now() - lastSaveTime < 60000){
        return;
    }
    lastSaveTime = Date.now();
    
    const body = getSaveBody();
    if(auto && body == lastContent){
        return;
    }
    lastContent = body;

    await fetch(getSaveUrl(), {
        method: "POST",
        headers: {
            "Content-Type": "text/plain"
        },
        body
    });

    <!-- alert("saved"); -->
}

</script>

</body>
</html>
